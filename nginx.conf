user root;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/null;
include /etc/nginx/modules-enabled/*.conf;

# Performance optimizations
timer_resolution 100ms;
worker_priority -5;
worker_rlimit_nofile 100000;

# PCRE JIT for faster regex matching
pcre_jit on;

events {
	worker_connections 20000;
	multi_accept on;
	use epoll;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	sendfile_max_chunk 1M;
	tcp_nopush on;
	tcp_nodelay on;
	types_hash_max_size 4096;
	server_tokens off;
	server_names_hash_max_size 4096;
	server_names_hash_bucket_size 128;

	# File descriptor optimizations - tuned for thousands of small segments
	open_file_cache max=200000 inactive=60s;
	open_file_cache_valid 60s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Connection optimizations - OPTIMIZED FOR UPLOADS
	reset_timedout_connection on;
	client_body_timeout 7200s;
	client_header_timeout 60s;
	send_timeout 7200s;
	keepalive_timeout 65s;
	keepalive_requests 10000;

	# Buffer optimizations - LARGER for better upload performance
	client_body_buffer_size 1M;
	client_max_body_size 0;
	client_header_buffer_size 4k;
	large_client_header_buffers 4 8k;
	output_buffers 8 256k;
	postpone_output 1460;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	#access_log /var/log/nginx/access.log;

	##
	# Gzip Settings
	##

	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_buffers 32 8k;
	gzip_http_version 1.1;
	gzip_min_length 1024;
	gzip_types
		text/plain
		text/css
		text/xml
		text/javascript
		application/json
		application/javascript
		application/xml+rss
		application/atom+xml
		image/svg+xml
		application/vnd.apple.mpegurl
		audio/mpegurl;

	##
	# AIO and Thread Pools for high-performance I/O
	##
	# Note: directio disabled globally to allow OS page cache for better upload performance
	# directio can be enabled per-location for large static file downloads

	aio threads=default;
	# directio 8m;  # Disabled - use page cache for better upload/download performance
	# directio_alignment 4096;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


